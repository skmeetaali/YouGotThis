{% extends "base.html" %}
{% block content %}

<div class="show">
    <table class="table table_hover">
        <thead>
            <th>Date</th>
            <th>Item</th>
        </thead>
        <tbody style="overflow-y: scroll;">
            {% for date , exp in grp.items() %}
            <tr style="background-color: antiquewhite;">
                <td>{{ date }}</td>
                <td>
                    {% for item in exp %}
                    {{ item.item }} - Rs{{item.amount}} <br><br>
                    {% endfor %} <br>
                </td>
            </tr> <br>

            {% endfor %}

            {% for total in totals %}
            <tr>
                <td>
                    date: {{total.date}}
                </td>
                <td>
                    total: {{total.total}}

                </td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
    <form action="{{url_for('exp.deleteall')}}" method="get">
        <button style="display: hidden;" class="btn btn-danger" onclick="return 'Sure?'">Delete All</button>
    </form>
</div>
{% endblock %}
